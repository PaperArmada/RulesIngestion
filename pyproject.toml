[project]
name = "rulesingestion"
version = "0.1.0"
description = "Deterministic rulebook extraction and retrieval pipeline"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "blake3>=0.3.3",
    "marker-pdf>=1.10.1",
    "opencv-python>=4.13.0.90",
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.uv]
dev-dependencies = [
    "pytest>=9.0.2",
]
