# Pathfinder 2e Player Core atomic rules benchmark.
# Keep query text language-locked to the shared atomic template so cross-ruleset
# comparisons reflect retrieval behavior and vocabulary drift, not benchmark rewrites.
retrieval_mode: dense
experiment_name: "pf2e_player_core_atomic_rules"
substrate_path: "out/Pathfinder2ePlayerCore"
document_id: "PathCore"
query_batches:
  - "evals/retrieval/Pathfinder2ePlayerCore/pathfinder2e_player_core_atomic_rules_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
seed: 42
gold_jaccard_threshold: 0.15
batch_size: 16
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
chunk_quality_gate_enabled: true
chunk_quality_max_short_le_40_rate: 0.10
chunk_quality_max_short_le_80_rate: 0.20
chunk_quality_max_duplicate_text_entry_rate: 0.05
