# D&D 5e PHB (2024 rules) — auto-gold pilot (GPT-5.4 reviewer).
# Output goes under: out/retrieval_lab/experiments/<experiment_id>
#
# 1) Embed once (from RulesIngestion root):
#    uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/dense/phb_autogold_pilot.yaml --embed-only
# 2) Run retrieval + auto-gold (use run_id from step 1):
#    uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/dense/phb_autogold_pilot.yaml --run-id <run_id>
#
retrieval_mode: dense
experiment_name: "phb_autogold_pilot"
experiment_id: "phb_autogold_pilot_20260306"
substrate_path: "out/DnD_PHB_5.5"
document_id: "DnD_PHB_5.5"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/PHB5e/dnd_5e_2024_rules_50q_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
expand_context: true
expand_context_n: 1
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16

# Auto-gold review: GPT-5.4 assigns required/supporting gold from top-k retrieval.
auto_gold_review:
  enabled: true
  llm_model_id: "gpt-5.4"
  candidate_top_k: 20
  retrieval_model_id: ""
  max_queries: 0
  max_chars_per_chunk: 1600
  max_required_gold: 5
  max_supporting_gold: 5
  review_queue_challenge_sample_size: 10
  max_required_overlap: 2
  persist_benchmark: true
