# PHB microbundle decomposition — autogold run for the 22 new child queries.
# No experiment_id so --experiment-name controls output dir.
# Run with: --batches /path/to/22_query_subset.json
retrieval_mode: dense
experiment_name: "phb_microbundle_decomposition_autogold"
substrate_path: "out/DnD_PHB_5.5"
document_id: "DnD_PHB_5.5"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/PHB5e/dnd_5e_2024_multihop_microbundle_working_set_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
expand_context: true
expand_context_n: 1
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16

auto_gold_review:
  enabled: true
  llm_model_id: "gpt-5.4"
  candidate_top_k: 20
  retrieval_model_id: ""
  max_queries: 0
  max_chars_per_chunk: 1600
  max_required_gold: 5
  max_supporting_gold: 5
  review_queue_challenge_sample_size: 10
  max_required_overlap: 2
  persist_benchmark: true
