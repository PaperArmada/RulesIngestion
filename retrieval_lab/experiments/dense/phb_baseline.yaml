# Dense retrieval baseline — PHB 5e (sentence-transformers embeddings).
# Step 1 (once per substrate): uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/dense/phb_baseline.yaml --embed-only
# Step 2 (evals): uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/dense/phb_baseline.yaml --run-id <run_id from step 1>
retrieval_mode: dense
experiment_name: "phb_dense_baseline"
substrate_path: "out/mark3_evaluation/DnD_PHB_5.5"
document_id: "DnD_PHB_5.5"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/PHB5e/dnd_5_e_equivalent_rag_eval_queries.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
expand_context: true
expand_context_n: 1
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
