# Experiment: Embedding Metadata Enrichment (EXPERIMENT-Embedding-Metadata-Enrichment.md)
# Run ablations: baseline (omit --embedding-enrichment-profile), path, type, topic_tags, full.
# SWCR substrate; min-anchor benchmark for aligned gold.
retrieval_mode: dense
experiment_name: "swcr_embedding_metadata_enrichment"
substrate_path: "out/SwordsAndWizardry/SW_Complete_Revised/SW Complete Revised PDF"
document_id: "SW Complete Revised PDF"
substrate_version: "v1_merged2000_min200"
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
# Minimal A′ hints so topic_tags/co_retrieval_hints exist for topic_tags/full ablations
a_prime_generate_minimal: true
query_batches:
  - "evals/retrieval/SwordsandWizardy/swords_wizardry_complete_revised_benchmark_min_anchor_atomic_rewrite.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
