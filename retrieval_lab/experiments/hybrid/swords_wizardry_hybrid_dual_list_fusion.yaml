# Swords & Wizardry Complete Revised: hybrid with dual-list fusion (Index_U + Index_F).
# Run after swords_wizardry_hybrid (same substrate) so unit embeddings exist; family embeddings are computed on first run.
retrieval_mode: hybrid
experiment_name: "swords_wizardry_hybrid_dual_list_fusion"
substrate_path: "out/Swords&Wizardry"
document_id: "Swords&Wizardry"
substrate_version: "v3_merged2000_min200"
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
query_batches:
  - "evals/retrieval/SwordsandWizardry/swords_wizardry_complete_revised_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20, 50]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
# Dual-list fusion (same params as PHB)
dual_list_fusion: true
dual_list_ku: 12
dual_list_kf: 12
dual_list_kfinal: 10
dual_list_qu: 6
dual_list_family_window: 3
dual_list_family_max_units: 6
dual_list_family_direction: "symmetric"
