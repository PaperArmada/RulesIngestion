# Hybrid retrieval (dense + BM25, CC fusion default) — PHB 5e.
# BASELINE for comparison only; NOT the production default.
# Production default: phb_hybrid_dual_list_fusion.yaml (dual-list fusion).
# Same substrate as dense. Embed once with dense config, then run with this config and --run-id.
retrieval_mode: hybrid
experiment_name: "phb_hybrid"
substrate_path: "out/DnD_PHB_5.5"
document_id: "DnD_PHB_5.5"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/PHB5e/dnd_5_e_equivalent_rag_eval_queries.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
