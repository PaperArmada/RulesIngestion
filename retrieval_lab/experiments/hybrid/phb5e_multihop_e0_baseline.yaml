# E0 PHB5e multihop baseline (no decomposition, no rerank)
experiment_name: "phb5e_multihop_e0_baseline"
retrieval_mode: hybrid
substrate_path: "out/DnD_PHB_5.5"
document_id: "DnD_PHB_5.5"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/PHB5e/dnd_5e_2024_multihop_working_set_benchmark.json"
  - "evals/retrieval/PHB5e/dnd_5e_2024_multihop_microbundle_working_set_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
reuse_embeddings: true
seed: 42
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
bm25_budget: 100
dense_budget: 100
hybrid_fusion_method: cc
cc_lambda: 0.7
cc_bm25_normalization: minmax
llm_rerank_admission_k: 20
llm_rerank_text_char_limit: 900
auto_gold_review:
  enabled: false
llm_rerank_enabled: false
query_enhancement:
  enabled: false
  mode: none
