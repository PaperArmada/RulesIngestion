# PF2E multihop R2 LLM listwise — working set only (20 queries), gpt-5.3-codex reranker.
# Use for parameter sweep: admission_k × text_char_limit (max_output_tokens from config).
# Run from repo root, e.g.:
#   uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/hybrid/pf2e_multihop_r2_sweep_working_set.yaml --llm-rerank
retrieval_mode: hybrid
experiment_name: "pf2e_multihop_r2_sweep_working_set"
substrate_path: "out/Pathfinder2ePlayerCore"
document_id: "PathCore"
query_batches:
  - "evals/retrieval/Pathfinder2ePlayerCore/pathfinder2e_player_core_multihop_working_set_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
seed: 42
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
bm25_budget: 100
dense_budget: 100
hybrid_fusion_method: cc
cc_lambda: 0.7
cc_bm25_normalization: minmax
llm_rerank_enabled: true
llm_rerank_method: listwise
llm_rerank_model: "gpt-5.3-codex"
llm_rerank_admission_k: 12
llm_rerank_text_char_limit: 900
llm_rerank_prompt_template_id: "pf2e_listwise_v1"
llm_rerank_max_output_tokens: 1200

auto_gold_review:
  enabled: true
  llm_model_id: "gpt-4o-mini"
  candidate_top_k: 20
  retrieval_model_id: ""
  max_queries: 0
  max_chars_per_chunk: 1600
  max_required_gold: 5
  max_supporting_gold: 5
  review_queue_challenge_sample_size: 10
  max_required_overlap: 2
  persist_benchmark: true
