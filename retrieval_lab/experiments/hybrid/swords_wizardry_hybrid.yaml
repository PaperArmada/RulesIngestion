# Hybrid retrieval (dense + BM25, RRF fusion) — Swords & Wizardry.
# Same substrate as dense. Embed once with dense config, then run with this config and --run-id.
# Run: uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/hybrid/swords_wizardry_hybrid.yaml --run-id 'retrieval_lab_Swords&Wizardry_v3_merged2000_min200'
retrieval_mode: hybrid
experiment_name: "swords_wizardry_hybrid"
substrate_path: "out/Swords&Wizardry"
document_id: "Swords&Wizardry"
substrate_version: "v3_merged2000_min100"
min_chars: 100  # retain meaningful short chunks (e.g. p37 "D"=destroyed, Turn Undead Variant; p14/p37 cleric caveats); for p37 full grouping use min_chars=20 (see page_37_turn_undead_chunks.md)
merge_chunks: true
merge_max_chars: 2000
query_batches:
  - "evals/retrieval/SwordsandWizardy/swords_wizardry_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20, 50]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
