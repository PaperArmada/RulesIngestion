# PF2E multihop decomposition via Responses API structured schema
# Query mix matches the existing R0 baseline for direct comparison.
experiment_name: "pf2e_multihop_e6_responses_decompose_qvocab"
retrieval_mode: hybrid
substrate_path: "out/Pathfinder2ePlayerCore"
document_id: "PathCore"
query_batches:
  - "evals/retrieval/Pathfinder2ePlayerCore/pathfinder2e_player_core_multihop_working_set_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
reuse_embeddings: true
seed: 42
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
bm25_budget: 100
dense_budget: 100
hybrid_fusion_method: cc
cc_lambda: 0.7
cc_bm25_normalization: minmax
llm_rerank_enabled: false
auto_gold_review:
  enabled: false
query_enhancement:
  enabled: true
  mode: decompose
  profile_path: "retrieval_lab/query_enhancement/profiles/pf2e_decompose_profile.json"
  fusion_mode: only_add
