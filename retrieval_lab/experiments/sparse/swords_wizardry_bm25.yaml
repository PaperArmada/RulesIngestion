# Sparse (BM25) retrieval baseline — Swords & Wizardry.
# Same substrate as dense (merged chunks, min_chars=200). No embedding step.
# Run: uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/sparse/swords_wizardry_bm25.yaml
retrieval_mode: bm25
experiment_name: "swords_wizardry_bm25_baseline"
substrate_path: "out/Swords&Wizardry"
document_id: "Swords&Wizardry"
substrate_version: "v3_merged2000_min200"
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
query_batches:
  - "evals/retrieval/SwordsandWizardy/swords_wizardry_benchmark.json"
models: []
top_k: [1, 3, 5, 10, 20, 50]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
gold_jaccard_threshold: 0.15
