# Sparse (BM25) retrieval baseline — Starfinder Player Core.
# Same substrate as dense. No embedding step.
# Run: uv run python -m retrieval_lab.run_experiment --config retrieval_lab/experiments/sparse/starfinder_bm25.yaml
retrieval_mode: bm25
experiment_name: "starfinder_bm25_baseline"
substrate_path: "out/mark3_evaluation/StarFinderPlayerCore"
document_id: "StarFinderPlayerCore"
substrate_version: "v2"
query_batches:
  - "evals/retrieval/StarFinderPlayerCore/batch_001.json"
  - "evals/retrieval/StarFinderPlayerCore/batch_002_state.json"
  - "evals/retrieval/StarFinderPlayerCore/batch_003_grounding.json"
  - "evals/retrieval/StarFinderPlayerCore/batch_004_temporal.json"
  - "evals/retrieval/StarFinderPlayerCore/batch_005_constraints.json"
  - "evals/retrieval/StarFinderPlayerCore/batch_006_conceptual.json"
models: []
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
mongo_uri: null
gold_jaccard_threshold: 0.15
