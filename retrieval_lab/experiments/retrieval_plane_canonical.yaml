# Canonical retrieval plane: five-stage path per Docs/Design/ARCHITECTURE-Retrieval-Runtime-Plane.md
# Baseline hybrid CC (minmax, lambda=0.7) -> candidate pool -> optional LLM rerank -> cited EvidenceUnits.
# No decomposition, no post-retrieval expansions, no deprecated knobs.
# Override substrate_path / document_id / query_batches for other corpora.
retrieval_mode: hybrid
experiment_name: "retrieval_plane_canonical"
substrate_path: "out/Pathfinder2ePlayerCore"
document_id: "PathCore"
query_batches:
  - "evals/retrieval/Pathfinder2ePlayerCore/pathfinder2e_player_core_multihop_working_set_benchmark.json"
models:
  - all-mpnet-base-v2
top_k: [1, 3, 5, 10, 20]
output_dir: "out/retrieval_lab/experiments"
reuse_embeddings: true
seed: 42
gold_semantic_top_n: 5
gold_jaccard_threshold: 0.15
batch_size: 16
min_chars: 200
merge_chunks: true
merge_max_chars: 2000
bm25_budget: 100
dense_budget: 100
hybrid_fusion_method: cc
cc_lambda: 0.7
cc_bm25_normalization: minmax
llm_rerank_enabled: false
llm_rerank_admission_k: 20
llm_rerank_text_char_limit: 900
query_enhancement:
  enabled: false
  mode: none
auto_gold_review:
  enabled: false
